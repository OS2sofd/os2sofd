html.page.person.view.modal.stop.header=SГҰt pausemarkering pГҘ medarbejderen
html.page.person.view.modal.stop.body=<p>Ved at sГҰtte en pausemarkering pГҘ medarbejderen, har man mulighed for at vГҰlge, hvorvidt medarbejderen i вҖқpausenвҖқ skal have adgang til kommunens IT-miljГё eller ej.<p></p>Hvis man sГҰtte hak i вҖқSГҰt udlГёb pГҘ AD-kontiвҖқ vil medarbejderens AD-konti ikke vГҰre tilgГҰngelige i pauseperioden, og dermed vil medarbejderen ikke have adgang til IT-miljГёet, hvilket bГҘde omfatter brugerkonti og rettigheder til eventuelle fagsystemer. NГҘr pausen er slut, vil adgangene automatisk blive genГҘbnet. Man kan ogsГҘ nГёjes med at markere en pause uden at вҖқlukke afвҖқ for IT-miljГёet, sГҘ vil brugeren fortsat kunne tilgГҘ dette, men blot vГҰre markeret som вҖқpГҘ pauseвҖқ. Feltet вҖқUndtag fra IDM-processerвҖқ bliver automatisk sat hvis man vГҰlger вҖқSГҰt udlГёb pГҘ AD-kontiвҖқ.</p><p>Start- og slutdato er begge inklusive вҖ“ dvs. det er fГёrste og sidste dag i pausen.</p>

